<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#34495e"/>
  
  <!-- Military elements -->
  <g transform="translate(50, 50)">
    <!-- Star symbol -->
    <path d="M0,-30 L6.9,-11.1 L27.8,-11.1 L11.1,1.7 L17.6,20.6 L0,8.2 L-17.6,20.6 L-11.1,1.7 L-27.8,-11.1 L-6.9,-11.1 Z" 
          fill="#f1c40f" transform="scale(0.85)"/>
          
    <!-- Tank silhouette -->
    <g transform="translate(0, 10) scale(0.4)">
      <rect x="-40" y="0" width="80" height="20" rx="5" fill="#2ecc71"/>
      <rect x="-45" y="10" width="90" height="25" rx="2" fill="#2ecc71"/>
      <rect x="-30" y="-10" width="60" height="15" rx="3" fill="#2ecc71"/>
      <rect x="-5" y="-20" width="10" height="20" fill="#2ecc71"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="50" y="85" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ecf0f1" text-anchor="middle">MILITARY TYCOON</text>
</svg>
